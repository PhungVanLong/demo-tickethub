spring.application.name=ticket-app

# Server Configuration
server.port=8081

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ticket-app
spring.datasource.username=postgres
spring.datasource.password=270504
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migration (optional - for database versioning)
# spring.flyway.enabled=true
# spring.flyway.baseline-on-migrate=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=YjRhYjViZDQ1OTcyYjY2Y2U2ZDEyMWQ0YzAxN2M4NzlkNWQ4MzQ5ZWM4MTIzYjdhZmI5NGNhNzJjYTM4Y2MxZg==
jwt.expiration-ms=86400000

# Admin account (auto-created on first startup)
admin.email=admin@tickethub.com
admin.password=Admin@123456

# Payment fee configuration
payment.platform-fee-rate=0.10
payment.gateway-fee-rate=0.02

# Voucher configuration
voucher.monthly.quantity=2
voucher.monthly.discount-percentage=10

# Scheduled tasks
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=scheduled-
